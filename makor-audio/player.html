<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Makor, listen to the study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --vellum:#f4ecd8; --vellum-deep:#ece0c4; --ink:#2b2622; --ink-soft:#5c5347;
    --lapis:#274690; --lapis-bright:#3a5db0; --brass:#b08636; --brass-soft:#cba85e; --line:#ddceac;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--vellum);color:var(--ink);font-family:"Newsreader",Georgia,serif;font-size:18px;line-height:1.6;padding:2.25rem 1.25rem 9.5rem}
  .wrap{max-width:660px;margin:0 auto}
  .eyebrow{font-family:"Fraunces",serif;letter-spacing:.18em;text-transform:uppercase;font-size:.72rem;color:var(--brass);margin:0 0 .35rem}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:2.1rem;line-height:1.1;margin:0 0 .4rem}
  .ref{color:var(--ink-soft);font-style:italic;margin:0 0 1.4rem}

  .voices{display:flex;flex-wrap:wrap;gap:.5rem;margin:0 0 1.6rem}
  .voices .vlabel{font-family:"Fraunces",serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);width:100%;margin-bottom:.1rem}
  .voice{font-family:"Fraunces",serif;font-size:.85rem;padding:.35rem .8rem;border:1px solid var(--line);border-radius:999px;background:transparent;color:var(--ink-soft);cursor:pointer}
  .voice.sel{background:var(--lapis);border-color:var(--lapis);color:var(--vellum)}

  .badge{display:none;align-items:center;gap:.5rem;background:#eef3e9;border:1px solid #c7d8bd;color:#3c5a34;padding:.55rem .8rem;border-radius:8px;font-size:.9rem;margin:0 0 1.4rem}
  .badge.show{display:flex}

  .group-title{font-family:"Fraunces",serif;font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:1.6rem 0 .4rem;border-bottom:1px solid var(--line);padding-bottom:.3rem}
  .seg{display:flex;align-items:center;gap:.85rem;width:100%;text-align:left;cursor:pointer;background:transparent;border:none;border-bottom:1px solid var(--line);padding:.65rem .2rem;color:var(--ink);font-family:inherit;font-size:1rem}
  .seg:hover{background:var(--vellum-deep)}
  .seg.active{background:var(--vellum-deep)}
  .seg .num{flex:0 0 1.6rem;color:var(--brass);font-family:"Fraunces",serif;font-size:.85rem;text-align:center}
  .seg .play{flex:0 0 auto;width:2rem;height:2rem;border-radius:50%;display:grid;place-items:center;border:1.5px solid var(--lapis);color:var(--lapis)}
  .seg.active .play{background:var(--lapis);color:var(--vellum)}
  .seg .play svg{width:.85rem;height:.85rem}
  .seg .label{flex:1 1 auto}
  .seg .dur{flex:0 0 auto;color:var(--ink-soft);font-size:.85rem;font-variant-numeric:tabular-nums}

  .bar{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:var(--vellum);box-shadow:0 -2px 20px rgba(0,0,0,.25)}
  .bar .inner{max-width:660px;margin:0 auto;padding:.7rem 1.1rem .9rem}
  .bar .now{display:flex;justify-content:space-between;align-items:baseline;gap:1rem;margin-bottom:.35rem}
  .bar .now .t{font-size:.98rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .now .k{font-family:"Fraunces",serif;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--brass-soft)}
  .bar .time{font-size:.78rem;color:var(--brass-soft);font-variant-numeric:tabular-nums;flex:0 0 auto}
  .track{height:4px;background:rgba(244,236,216,.2);border-radius:2px;overflow:hidden;cursor:pointer;margin:.15rem 0 .7rem}
  .track i{display:block;height:100%;width:0;background:var(--brass)}
  .ctrls{display:flex;align-items:center;justify-content:center;gap:.35rem}
  .ctrls button{background:transparent;border:none;color:var(--vellum);cursor:pointer;display:grid;place-items:center;border-radius:50%}
  .ctrls .icon{width:2.6rem;height:2.6rem}
  .ctrls .icon svg{width:1.35rem;height:1.35rem}
  .ctrls .skip{position:relative;font-family:"Fraunces",serif;color:var(--brass-soft)}
  .ctrls .skip svg{width:1.6rem;height:1.6rem}
  .ctrls .skip span{position:absolute;left:0;right:0;top:50%;transform:translateY(-42%);text-align:center;font-size:.5rem}
  .ctrls .main{width:3.2rem;height:3.2rem;background:var(--brass);color:var(--ink)}
  .ctrls .main svg{width:1.5rem;height:1.5rem}

  .err{background:#fbe7e7;border:1px solid #e3b7b7;color:#7a2b2b;padding:1rem;border-radius:6px;font-size:.95rem}
  code{background:rgba(0,0,0,.06);padding:.05rem .3rem;border-radius:3px}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Makor, an audio study</p>
  <h1 id="title">Loading...</h1>
  <p class="ref" id="ref"></p>

  <div class="voices" id="voices"><span class="vlabel">Voice</span></div>
  <div class="badge" id="badge"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M9 16.2l-3.5-3.5L4 14.2 9 19.2 20 8.2l-1.5-1.5z"/></svg><span id="badgetext">Day complete: you listened all the way through. Unscored.</span></div>

  <div id="list"></div>
</div>

<div class="bar" id="bar" style="display:none">
  <div class="inner">
    <div class="now"><div><div class="k" id="nowkind">The passage</div><div class="t" id="nowtitle">-</div></div><div class="time" id="time">0:00 / 0:00</div></div>
    <div class="track" id="track"><i id="prog"></i></div>
    <div class="ctrls">
      <button class="icon" id="prev" title="Previous section"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="skip icon" id="rew" title="Back 90 seconds"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5V1L6 6l6 5V7a7 7 0 1 1-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg><span>90</span></button>
      <button class="icon main" id="play" title="Play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="skip icon" id="fwd" title="Forward 30 seconds"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5V1l6 5-6 5V7a7 7 0 1 0 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg><span>30</span></button>
      <button class="icon" id="next" title="Next section"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg></button>
    </div>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
// Where the manifest lives, relative to this file (from: --outdir demo-audio).
const MANIFEST_URL = "demo-audio/manifest.json";
const REWIND = 90, FORWARD = 30;

const PLAY='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
const PAUSE='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';
const KIND={intro:"Introduction",passage:"The passage",teaching:"The study"};

const audio=document.getElementById("audio");
let M=null, base="", voice=null, list=[], offsets=[], total=0, idx=0, pending=null, slug="";

const fmt=s=>{s=Math.max(0,Math.round(s||0));return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")};
const listenedKey=()=>"makor-listened-"+slug;
function resolve(file){ return base + file; }

function buildPlaylist(){
  const v=M.voices[voice];
  list=v.segments.slice();
  offsets=[]; total=0;
  for(const s of list){ offsets.push(total); total+=s.seconds||0; }
}
function globalTime(){ return (offsets[idx]||0) + (audio.currentTime||0); }

function loadTrack(i, seekWithin=0, autoplay=true){
  idx=Math.max(0,Math.min(list.length-1,i));
  const seg=list[idx];
  pending=seekWithin;
  audio.src=resolve(seg.file);
  audio.load();
  if(autoplay) audio.play().catch(()=>{});
  document.getElementById("nowkind").textContent=KIND[seg.kind]||"Playing";
  document.getElementById("nowtitle").textContent=seg.label;
  renderActive();
  setMediaMeta(seg);
}
function seekGlobal(t){
  t=Math.max(0,Math.min(total,t));
  let i=0; while(i<list.length-1 && t>=offsets[i]+(list[i].seconds||0)) i++;
  const within=t-offsets[i];
  if(i===idx){ audio.currentTime=within; } else { loadTrack(i,within,!audio.paused); }
}

audio.addEventListener("loadedmetadata",()=>{ if(pending!=null){ try{audio.currentTime=pending;}catch(e){} pending=null; } });
audio.addEventListener("timeupdate",()=>{
  const gt=globalTime();
  document.getElementById("time").textContent=fmt(gt)+" / "+fmt(total);
  document.getElementById("prog").style.width=(total?gt/total*100:0)+"%";
  if("mediaSession" in navigator && audio.duration){
    try{navigator.mediaSession.setPositionState({duration:audio.duration,position:audio.currentTime,playbackRate:1});}catch(e){}
  }
});
audio.addEventListener("play",()=>{ document.getElementById("play").innerHTML=PAUSE; renderActive(); });
audio.addEventListener("pause",()=>{ document.getElementById("play").innerHTML=PLAY; renderActive(); });
audio.addEventListener("ended",()=>{
  if(idx<list.length-1){ loadTrack(idx+1,0,true); }
  else { markListenedThrough(); }
});

document.getElementById("play").onclick=()=>{ if(!audio.src) loadTrack(0,0,true); else if(audio.paused) audio.play(); else audio.pause(); };
document.getElementById("prev").onclick=()=>{ if(globalTime()-(offsets[idx]||0) > 3 || idx===0) seekGlobal(offsets[idx]||0); else loadTrack(idx-1,0,!audio.paused); };
document.getElementById("next").onclick=()=>{ if(idx<list.length-1) loadTrack(idx+1,0,!audio.paused); };
document.getElementById("rew").onclick=()=>seekGlobal(globalTime()-REWIND);
document.getElementById("fwd").onclick=()=>seekGlobal(globalTime()+FORWARD);
document.getElementById("track").onclick=e=>{ const r=e.currentTarget.getBoundingClientRect(); seekGlobal((e.clientX-r.left)/r.width*total); };

function renderActive(){
  document.querySelectorAll(".seg").forEach(el=>{
    const on=+el.dataset.i===idx;
    el.classList.toggle("active",on);
    el.querySelector(".play").innerHTML=(on&&!audio.paused)?PAUSE:PLAY;
  });
}

function markListenedThrough(){
  document.getElementById("play").innerHTML=PLAY;
  try{ localStorage.setItem(listenedKey(),"1"); }catch(e){}
  showBadge();
  // Renderer hook: wire this to "day complete, unscored" in the user's progress.
  if(window.onMakorListenedThrough) window.onMakorListenedThrough(slug);
}
function showBadge(){ document.getElementById("badge").classList.add("show"); }

function setMediaMeta(seg){
  if(!("mediaSession" in navigator)) return;
  navigator.mediaSession.metadata=new MediaMetadata({
    title:seg.label,
    artist:"Makor  ·  "+(M.voices[voice].label||voice),
    album:M.study.title+"  ·  "+(M.study.passageRef||"")
  });
  const H=navigator.mediaSession.setActionHandler.bind(navigator.mediaSession);
  try{H("play",()=>audio.play());}catch(e){}
  try{H("pause",()=>audio.pause());}catch(e){}
  try{H("previoustrack",()=>document.getElementById("prev").click());}catch(e){}
  try{H("nexttrack",()=>document.getElementById("next").click());}catch(e){}
  try{H("seekbackward",e=>seekGlobal(globalTime()-((e&&e.seekOffset)||REWIND)));}catch(e){}
  try{H("seekforward",e=>seekGlobal(globalTime()+((e&&e.seekOffset)||FORWARD)));}catch(e){}
  try{H("seekto",e=>{ if(e.fastSeek&&"fastSeek"in audio){audio.fastSeek(e.seekTime);return;} audio.currentTime=e.seekTime; });}catch(e){}
}

function renderList(){
  const box=document.getElementById("list"); box.innerHTML="";
  const groups=[["passage","The passage, movement by movement"],["teaching","The study, step by step"],["intro","Introduction"]];
  let n=0;
  groups.forEach(([kind,heading])=>{
    const segs=list.filter(s=>s.kind===kind);
    if(!segs.length) return;
    const h=document.createElement("div"); h.className="group-title"; h.textContent=heading; box.appendChild(h);
    segs.forEach(seg=>{
      const i=list.indexOf(seg); n++;
      const b=document.createElement("button");
      b.className="seg"; b.dataset.i=i;
      b.innerHTML='<span class="num">'+n+'</span><span class="play">'+PLAY+'</span><span class="label">'+seg.label+'</span><span class="dur">'+fmt(seg.seconds)+'</span>';
      b.onclick=()=>loadTrack(i,0,true);
      box.appendChild(b);
    });
  });
  renderActive();
}

function renderVoices(){
  const box=document.getElementById("voices");
  Object.entries(M.voices).forEach(([id,v])=>{
    const b=document.createElement("button");
    b.className="voice"+(id===voice?" sel":""); b.textContent=v.label; b.dataset.v=id;
    b.onclick=()=>switchVoice(id);
    box.appendChild(b);
  });
}
function switchVoice(id){
  if(id===voice) return;
  const gt=globalTime(), wasPlaying=!audio.paused, curId=list[idx].id;
  voice=id;
  document.querySelectorAll(".voice").forEach(el=>el.classList.toggle("sel",el.dataset.v===id));
  buildPlaylist(); renderList();
  const same=list.findIndex(s=>s.id===curId);
  idx=same>=0?same:0;
  loadTrack(idx, Math.max(0, gt-(offsets[idx]||0)), wasPlaying);
}

fetch(MANIFEST_URL).then(r=>{if(!r.ok)throw 0;return r.json()}).then(m=>{
  M=m; slug=m.study.slug||"study";
  const dir=MANIFEST_URL.slice(0,MANIFEST_URL.lastIndexOf("/")+1);
  base = m.audioBase ? (m.audioBase.replace(/\/?$/,"/") + (m.studyPath||"")) : dir;
  voice=m.defaultVoice || Object.keys(m.voices)[0];
  document.getElementById("title").textContent=m.study.title||"Study";
  document.getElementById("ref").textContent=(m.study.passageRef||"")+"  ·  generated once, served static";
  buildPlaylist(); renderVoices(); renderList();
  document.getElementById("bar").style.display="block";
  if(localStorage.getItem(listenedKey())==="1") showBadge();
}).catch(()=>{
  document.getElementById("title").textContent="No audio yet";
  document.getElementById("list").innerHTML='<div class="err">Could not load <code>'+MANIFEST_URL+'</code>. Generate it first:<br><br><code>python3 generate_audio.py --study sample-study/01-the-seven-days.json --outdir demo-audio</code><br><br>then <code>python3 -m http.server 8000</code> and open this page.</div>';
});
</script>
</body>
</html>
